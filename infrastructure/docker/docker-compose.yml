version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: moallem-postgres
    environment:
      POSTGRES_USER: moallem
      POSTGRES_PASSWORD: password
      POSTGRES_DB: moallem_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moallem -d moallem_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: moallem-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/api.Dockerfile
    container_name: moallem-api
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://moallem:password@postgres:5432/moallem_dev
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../apps/api:/app/apps/api
      - ../../packages:/app/packages
      - /app/node_modules
      - /app/apps/api/node_modules

volumes:
  postgres_data:
  redis_data: